name: 🔥 Update GitHub Trending

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install scrapling jinja2 curl_cffi browserforge
          python -c "from scrapling.fetchers import Fetcher; print('Scrapling OK')"

      - name: Scrape GitHub Trending
        working-directory: github-trending-deploy
        run: |
          python scrape_trending.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-trending-deploy/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📅 Auto-update GitHub Trending ($(date -u '+%Y-%m-%d'))"
          git push
